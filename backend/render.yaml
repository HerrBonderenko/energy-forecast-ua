services:
  - type: web
    name: energy-forecast-ua-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENTSOE_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://energy-forecast-ua.vercel.app
    healthCheckPath: /health
